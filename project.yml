name: Klipt
options:
  bundleIdPrefix: app.klipt
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Klipt
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Klipt:
    type: application
    platform: macOS
    sources:
      - path: Klipt
    settings:
      base:
        INFOPLIST_FILE: Klipt/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Klipt/Resources/Klipt.entitlements
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: Klipt/Resources/Klipt.entitlements
