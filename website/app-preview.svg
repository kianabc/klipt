<svg width="480" height="360" viewBox="0 0 480 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Window background -->
  <rect width="480" height="360" rx="16" fill="#111115"/>
  <rect x="0.5" y="0.5" width="479" height="359" rx="15.5" stroke="white" stroke-opacity="0.08"/>

  <!-- Tab bar -->
  <!-- All tab (selected) -->
  <rect x="14" y="12" width="58" height="28" rx="14" fill="white" fill-opacity="0.12"/>
  <text x="28" y="30" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" font-weight="600" fill="white">
    <tspan>All</tspan>
  </text>
  <!-- Text tab -->
  <rect x="78" y="12" width="36" height="28" rx="14" fill="white" fill-opacity="0.04"/>
  <text x="88" y="30" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.35">T</text>
  <!-- Images tab -->
  <rect x="120" y="12" width="36" height="28" rx="14" fill="white" fill-opacity="0.04"/>
  <text x="130" y="30" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.35">S</text>
  <!-- Files tab -->
  <rect x="162" y="12" width="36" height="28" rx="14" fill="white" fill-opacity="0.04"/>
  <text x="172" y="30" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.35">F</text>
  <!-- Pinned tab -->
  <rect x="204" y="12" width="36" height="28" rx="14" fill="white" fill-opacity="0.04"/>
  <text x="214" y="30" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="#f59e0b" fill-opacity="0.5">P</text>

  <!-- Pin button -->
  <circle cx="446" cy="26" r="15" fill="white" fill-opacity="0.05"/>
  <text x="440" y="31" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.25">P</text>

  <!-- Search bar -->
  <rect x="14" y="48" width="452" height="34" rx="10" fill="white" fill-opacity="0.05"/>
  <text x="36" y="69" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.3">Search...</text>

  <!-- Item 1 - Selected text item -->
  <rect x="10" y="90" width="460" height="52" rx="10" fill="#3b82f6" fill-opacity="0.05"/>
  <rect x="10.5" y="90.5" width="459" height="51" rx="9.5" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Icon -->
  <rect x="20" y="101" width="30" height="30" rx="8" fill="#3b82f6" fill-opacity="0.1"/>
  <text x="29" y="121" font-family="-apple-system, SF Pro Display, sans-serif" font-size="12" font-weight="600" fill="#3b82f6">T</text>
  <!-- Content -->
  <text x="60" y="112" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.85">Meeting notes from the design review...</text>
  <text x="60" y="128" font-family="-apple-system, SF Pro Display, sans-serif" font-size="11" fill="white" fill-opacity="0.25">2 min ago</text>
  <!-- Pin icon -->
  <text x="430" y="116" font-family="-apple-system, SF Pro Display, sans-serif" font-size="9" fill="#f59e0b" fill-opacity="0.7">pin</text>

  <!-- Item 2 - Image item -->
  <rect x="10" y="146" width="460" height="52" rx="10" fill="transparent"/>
  <rect x="20" y="157" width="30" height="30" rx="8" fill="#8b5cf6" fill-opacity="0.1"/>
  <text x="28" y="177" font-family="-apple-system, SF Pro Display, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">S</text>
  <!-- Thumbnail placeholder -->
  <rect x="60" y="155" width="36" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.15"/>
  <text x="68" y="174" font-family="-apple-system, SF Pro Display, sans-serif" font-size="10" fill="#8b5cf6" fill-opacity="0.6">IMG</text>
  <text x="104" y="172" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.85">Screenshot</text>
  <text x="104" y="186" font-family="-apple-system, SF Pro Display, sans-serif" font-size="11" fill="white" fill-opacity="0.25">5 min ago</text>

  <!-- Item 3 - Text item -->
  <rect x="10" y="202" width="460" height="52" rx="10" fill="transparent"/>
  <rect x="20" y="213" width="30" height="30" rx="8" fill="#3b82f6" fill-opacity="0.1"/>
  <text x="29" y="233" font-family="-apple-system, SF Pro Display, sans-serif" font-size="12" font-weight="600" fill="#3b82f6">T</text>
  <text x="60" y="228" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.85">https://klipt.app</text>
  <text x="60" y="244" font-family="-apple-system, SF Pro Display, sans-serif" font-size="11" fill="white" fill-opacity="0.25">12 min ago</text>

  <!-- Item 4 - File item -->
  <rect x="10" y="258" width="460" height="52" rx="10" fill="transparent"/>
  <rect x="20" y="269" width="30" height="30" rx="8" fill="#f59e0b" fill-opacity="0.1"/>
  <text x="28" y="289" font-family="-apple-system, SF Pro Display, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">F</text>
  <text x="60" y="284" font-family="-apple-system, SF Pro Display, sans-serif" font-size="13" fill="white" fill-opacity="0.85">presentation-final.pdf</text>
  <text x="60" y="300" font-family="-apple-system, SF Pro Display, sans-serif" font-size="11" fill="white" fill-opacity="0.25">1 hr ago</text>

  <!-- Bottom bar -->
  <rect x="0" y="318" width="480" height="42" rx="0" fill="white" fill-opacity="0.03"/>
  <!-- Expand button -->
  <rect x="14" y="326" width="80" height="26" rx="13" fill="white" fill-opacity="0.05"/>
  <text x="28" y="343" font-family="-apple-system, SF Pro Display, sans-serif" font-size="11" font-weight="500" fill="white" fill-opacity="0.35">Expand</text>

  <!-- Hints -->
  <rect x="350" y="328" width="24" height="20" rx="4" fill="white" fill-opacity="0.06"/>
  <text x="357" y="342" font-family="-apple-system, SF Pro Display, sans-serif" font-size="9" font-weight="500" fill="white" fill-opacity="0.3">up</text>
  <text x="378" y="342" font-family="-apple-system, SF Pro Display, sans-serif" font-size="10" fill="white" fill-opacity="0.2">browse</text>

  <rect x="420" y="328" width="18" height="20" rx="4" fill="white" fill-opacity="0.06"/>
  <text x="424" y="342" font-family="-apple-system, SF Pro Display, sans-serif" font-size="9" font-weight="500" fill="white" fill-opacity="0.3">tab</text>
  <text x="442" y="342" font-family="-apple-system, SF Pro Display, sans-serif" font-size="10" fill="white" fill-opacity="0.2">exp</text>

  <!-- Rounded bottom corners mask -->
  <rect width="480" height="360" rx="16" fill="none" stroke="none"/>
</svg>
